spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mi_app}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# --- Seguridad ---
# En Railway, define JWT_SECRET con un valor nuevo (NO uses el de abajo, es solo para que
# el proyecto levante en local sin configuracion adicional). El valor de abajo quedo
# expuesto en el historial de git, por eso ya no se usa en produccion.
app.jwt.secret=${JWT_SECRET:dev_only_local_secret_no_usar_en_produccion_cambiame}

# Client ID de OAuth de Android (no es secreto, ya esta embebido en el APK, pero lo
# externalizamos igual para poder cambiarlo sin tocar codigo)
app.google.client-id=${GOOGLE_CLIENT_ID:751618758049-va742gbpc4q1g85418c2kfaubf48s562.apps.googleusercontent.com}
